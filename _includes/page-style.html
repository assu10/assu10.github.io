<style id="_pageStyle">
{% capture page_style %}
  /* 모든 .content 링크 색상 */
  .content a {
    color: {{ color }};
    border-color: fade-out({{ color }}, 0.8);
  }

  /* 본문 링크 hover/padding (post body만) */
  .markdown-body a {
    border-radius: 2px;
    padding: 2px 4px;
  }

  .markdown-body a:hover {
    border-color: #1FC489;
    background-color: rgba(31, 196, 137, 0.15);
    color: #1FC489;
  }

  /* 태그 배지 링크 hover */
  a.tag-badge:hover {
    background-color: rgba(31, 196, 137, 0.15);
    color: #1FC489;
  }

  /* 리스트 페이지 제목 내 코드: 본문 폰트 유지 */
  .related-posts code {
    font-family: inherit;
    background-color: rgba(0, 0, 0, 0.06);
    border: none;
    border-radius: 3px;
    padding: 1px;
  }

  /* 제목 내 코드: 둥근 모서리 + 줄바꿈 시 각 줄 독립 배경 */
  .post-title code {
    font-family: inherit;
    background-color: rgba(0, 0, 0, 0.06);
    border: none;
    border-radius: 4px;
    padding: 1px;
    font-size: 0.9em;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }

  /* 인라인 코드: 색상 상속, 연한 배경, 본문 폰트 유지로 공백 너비 일관성 */
  .markdown-body code {
    font-family: inherit;
    color: inherit;
    background-color: rgba(0, 0, 0, 0.06);
    border: none;
    border-radius: 3px;
    padding: 1px;
    font-size: inherit;
  }

  :focus {
    outline-color: {{ color }};
  }

  ::selection {
    color: #fff;
    background: {{ color }};
  }

  ::-moz-selection {
    color: #fff;
    background: {{ color }};
  }
{% endcapture %}
{{ page_style | scssify }}
</style>
