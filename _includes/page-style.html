<style id="_pageStyle">
{% capture page_style %}
  /* 본문 링크 (markdown-body 내부만) */
  .markdown-body a {
    color: {{ color }};
    border-color: fade-out({{ color }}, 0.8);
    border-radius: 2px;
    padding: 2px 4px;
  }

  .markdown-body a:hover {
    border-color: #1FC489;
    background-color: rgba(31, 196, 137, 0.15);
    color: #1FC489;
  }

  /* 인라인 코드: 색상 상속, 연한 배경, 좌우 여백 축소 */
  .markdown-body code {
    color: inherit;
    background-color: rgba(0, 0, 0, 0.06);
    border: none;
    border-radius: 3px;
    padding: 3px 0;
    font-size: 0.85em;
  }

  :focus {
    outline-color: {{ color }};
  }

  ::selection {
    color: #fff;
    background: {{ color }};
  }

  ::-moz-selection {
    color: #fff;
    background: {{ color }};
  }
{% endcapture %}
{{ page_style | scssify }}
</style>
