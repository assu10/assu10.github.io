<style id="_pageStyle">
{% capture page_style %}
  /* 모든 .content 링크 색상 */
  .content a {
    color: {{ color }};
    border-color: fade-out({{ color }}, 0.8);
  }

  /* 본문 링크 hover/padding (post body만) */
  .markdown-body a {
    border-radius: 2px;
    padding: 2px 4px;
  }

  .markdown-body a:hover {
    border-color: #1FC489;
    background-color: rgba(31, 196, 137, 0.15);
    color: #1FC489;
  }

  /* 태그 배지 링크 hover */
  a.tag-badge:hover {
    background-color: rgba(31, 196, 137, 0.15);
    color: #1FC489;
  }

  /* 리스트 페이지 제목 내 코드: 본문 폰트 유지 */
  .related-posts code {
    font-family: inherit;
    background-color: rgba(0, 0, 0, 0.06);
    border: none;
    border-radius: 3px;
    padding: 1px;
  }

  /* 제목 내 코드: 둥근 모서리 + 줄바꿈 시 각 줄 독립 배경 */
  .post-title code {
    font-family: inherit;
    background-color: rgba(0, 0, 0, 0.06);
    border: none;
    border-radius: 4px;
    padding: 1px;
    font-size: 0.9em;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }

  /* 인라인 코드: 색상 상속, 연한 배경, 본문 폰트 유지로 공백 너비 일관성 */
  .markdown-body code {
    font-family: inherit;
    color: inherit;
    background-color: rgba(0, 0, 0, 0.06);
    border: none;
    border-radius: 3px;
    padding: 1px;
    font-size: inherit;
  }

  /* Notion/Confluence 스타일 blockquote */
  blockquote {
    border-left: 3px solid #c8cdd3;
    background-color: #f7f8f9;
    color: #4a5568;
    padding: 0.8rem 1.2rem;
    margin: 1.25rem 0;
    border-radius: 0 6px 6px 0;
  }

  blockquote p:last-child {
    margin-bottom: 0;
  }

pre.mermaid { background: none; overflow-x: auto; overflow-y: visible; max-width: 100%; }
pre.mermaid svg { overflow: visible !important; max-width: 100%; width: 100% !important; height: auto !important; }

  /* GitHub Light code block theme */
  pre {
    background-color: #f6f8fa;
    border: none;
    border-radius: 6px;
  }

  /* comments */
  .highlight .c, .highlight .cm, .highlight .c1, .highlight .cs {
    color: #6a737d;
    font-style: italic;
  }
  /* keywords */
  .highlight .k, .highlight .kc, .highlight .kd,
  .highlight .kn, .highlight .kp, .highlight .kr { color: #d73a49; font-weight: normal; }
  /* strings */
  .highlight .s, .highlight .sb, .highlight .sc, .highlight .sd,
  .highlight .s2, .highlight .se, .highlight .sh, .highlight .si,
  .highlight .sx, .highlight .sr, .highlight .s1, .highlight .ss { color: #032f62; }
  /* numbers */
  .highlight .m, .highlight .mf, .highlight .mh,
  .highlight .mi, .highlight .mo, .highlight .il { color: #005cc5; }
  /* functions */
  .highlight .nf { color: #6f42c1; font-weight: normal; }
  /* class names */
  .highlight .nc { color: #6f42c1; font-weight: bold; }
  /* built-ins */
  .highlight .nb { color: #005cc5; }
  /* variables */
  .highlight .nv, .highlight .vc,
  .highlight .vg, .highlight .vi { color: #e36209; }
  /* operators */
  .highlight .o, .highlight .ow { color: #d73a49; }
  /* tags */
  .highlight .nt { color: #22863a; }
  /* attributes */
  .highlight .na { color: #6f42c1; }
  /* error */
  .highlight .err { color: #b31d28; background-color: #ffdce0; }
  /* diff */
  .highlight .gd { color: #b31d28; background-color: #ffdce0; }
  .highlight .gi { color: #22863a; background-color: #dcffe4; }

  :focus {
    outline-color: {{ color }};
  }

  ::selection {
    color: #fff;
    background: {{ color }};
  }

  ::-moz-selection {
    color: #fff;
    background: {{ color }};
  }
{% endcapture %}
{{ page_style | scssify }}
</style>
